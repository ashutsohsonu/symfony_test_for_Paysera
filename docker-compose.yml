services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: fund_transfer_app
    volumes:
      - .:/var/www/html:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - DATABASE_URL=mysql://app:secret@db:3306/fund_transfer?serverVersion=8.0&charset=utf8mb4
      - MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0
    networks:
      - fund_transfer_net

  nginx:
    image: nginx:1.27-alpine
    container_name: fund_transfer_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fund_transfer_net

  db:
    image: mysql:8.0
    container_name: fund_transfer_db
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: fund_transfer
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fund_transfer_net

  redis:
    image: redis:7.4-alpine
    container_name: fund_transfer_redis
    command: redis-server --requirepass redissecret --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redissecret", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - fund_transfer_net

  test_db:
    image: mysql:8.0
    container_name: fund_transfer_test_db
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: fund_transfer_test
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "app", "-psecret" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fund_transfer_net

volumes:
  db_data:
  redis_data:


networks:
  fund_transfer_net:
    driver: bridge
